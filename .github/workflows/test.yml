name: Test implementation risk scanner

on:
  push:
    branches:
      - main
      - phase-3-reviewer-workflow
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install package metadata
        run: npm install --ignore-scripts

      - name: Run reviewer and core test suites
        run: npm test
